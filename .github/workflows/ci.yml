name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Vet
        run: CGO_ENABLED=0 go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Test (unit)
        run: CGO_ENABLED=0 go test ./...

      - name: Test (integration)
        run: CGO_ENABLED=0 go test -tags=integration ./...

      - name: Build
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/lrclib

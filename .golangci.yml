version: "2"

linters:
  enable:
    - errcheck
    - godot
    - gofumpt
    - gosimple
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused

formatters:
  enable:
    - gofumpt

linters-settings:
  gofumpt:
    extra-rules: true
  revive:
    rules:
      - name: exported
        arguments:
          - disableStutteringCheck
  godot:
    scope: declarations

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
